server:
  port: 8090

spring:
  application:
    name: demo-auth

  # Demo 不需要 Redis
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # === 默认：H2 内存数据库（零配置，开箱即用）===
  # 切 PostgreSQL：设置环境变量 DB_URL / DB_USERNAME / DB_PASSWORD
  datasource:
    url: ${DB_URL:jdbc:h2:mem:demo_auth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  # H2 控制台（开发调试用）：http://localhost:8090/h2-console
  h2:
    console:
      enabled: true

  # 启动时自动建表
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-demo.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

demo:
  jwt:
    secret: ${JWT_SECRET:demo-jwt-secret-key-at-least-32-chars!!}
    expire-hours: 24

logging:
  level:
    com.uas.demo: DEBUG
